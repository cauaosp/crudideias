version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ideiasdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flask:
    build: .
    container_name: flask_app
    restart: always
    depends_on:
      - db
    env_file:
      - .env.docker
    ports:
      - "4949:4949"

volumes:
  postgres_data:
