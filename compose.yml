version: "3.9"

services:
  db:
    image: postgres:16
    container_name: crudideias_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flask:
    build: .
    container_name: flask_app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "4949:4949"

volumes:
  postgres_data:
